name: noel_raffle
description: "Noel Raffle — modern, kurumsal yılbaşı ve hediye çekilişi uygulaması."
# Prevents accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+8

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization (TR / EN / AR)
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.2

  # State management & clean architecture
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0

  # Networking
  http: ^1.1.2

  # Local persistence (theme preference)
  shared_preferences: ^2.2.3

  # UI & platform helpers
  confetti: ^0.7.0
  url_launcher: ^6.3.0
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  flutter_launcher_icons: ^0.9.2
  flutter_lints: ^4.0.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "icons/noelapplogo.jpeg"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/gift-hand.png
    - assets/images/logo.png
    - assets/images/background.jpg
    - assets/images/gift-raffle.png
    - assets/images/logo2.png
    - assets/images/logo3.png
    - assets/images/menu.jpg
    - assets/images/Vector.png

  fonts:
    - family: MountainsofChristmas
      fonts:
        - asset: assets/fonts/MountainsofChristmas-Bold.ttf
          weight: 700
        - asset: assets/fonts/MountainsofChristmas-Regular.ttf
          weight: 400
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
    - family: DancingScript
      fonts:
        - asset: assets/fonts/DancingScript.ttf
